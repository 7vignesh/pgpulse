# ---------------------------------------------------------------------------
# postgresql.conf overrides for the PRIMARY.
# Mounted and included via the docker entrypoint command.
# ---------------------------------------------------------------------------

listen_addresses = '*'

# --- Extensions preloaded at server start ---
# pg_stat_statements + pg_cron must be in shared_preload_libraries.
shared_preload_libraries = 'pg_stat_statements,pg_cron'

# pg_cron runs its background worker against this database.
cron.database_name = 'pgpulse'

# --- pg_stat_statements ---
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# --- Replication (streaming replica) ---
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on
wal_keep_size = '256MB'

# --- Sensible dev defaults ---
max_connections = 100
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 16MB
maintenance_work_mem = 128MB
