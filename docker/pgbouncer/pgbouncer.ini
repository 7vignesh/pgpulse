# ---------------------------------------------------------------------------
# PgBouncer in TRANSACTION pooling mode.
#
# Why transaction mode:
#   - Maximum server-connection reuse: a backend is returned to the pool at the
#     end of each transaction, so a small server pool serves many clients.
#   - Tradeoff: no session-level features survive across statements. Prepared
#     statements, LISTEN/NOTIFY, advisory-session locks, and SET (without LOCAL)
#     are unsafe. The app accounts for this (SET LOCAL only, no named prepared
#     statements). See docs/SCALING.md.
# ---------------------------------------------------------------------------
[databases]
pgpulse = host=postgres port=5432 dbname=pgpulse

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction

# Up to 100 client connections multiplexed onto a small server pool.
max_client_conn = 100
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

# Disable server-side prepared statement support consistency under txn mode.
# (PgBouncer 1.21+ can track prepared statements, but we keep it off to match
#  the documented "no prepared statements" contract.)
max_prepared_statements = 0

server_reset_query = DISCARD ALL
ignore_startup_parameters = extra_float_digits

log_connections = 0
log_disconnections = 0
